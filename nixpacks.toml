[phases.setup]
nixPkgs = ["nodejs_20", "python313"]

[phases.install]
cmds = [
  "curl -LsSf https://astral.sh/uv/install.sh | sh",
  "~/.local/bin/uv sync --frozen",
  "cd dashboard && npm ci"
]

[phases.build]
cmds = ["cd dashboard && npm run build"]

[start]
cmd = "~/.local/bin/uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
